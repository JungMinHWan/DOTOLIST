<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Todo List</title>
  <link rel="stylesheet" href="./css/style.css?v=3.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1><img src="./images/logo.png" alt="로고" class="header-logo"> TODO LIST</h1>
      <div class="header-actions">
        <button class="icon-btn" id="searchToggleBtn">🔍</button>
        <button class="icon-btn" id="memoToggleBtn" title="메모">
          📝
          <span class="memo-badge" id="memoBadge" style="background:#ff3b30;">♥</span>
        </button>
        <button class="icon-btn" id="diaryToggleBtn" title="일기장">
          📔
          <span class="memo-badge" id="diaryBadge" style="background:#3b82f6;">♥</span>
        </button>
        <button class="icon-btn" id="newsToggleBtn" title="신문">
          📰
          <span class="memo-badge" id="newsBadge" style="background:#10b981;">♥</span>
        </button>
      </div>
    </div>
    
    <div class="period-tabs">
      <button class="period-tab" data-period="yesterday">어</button>
      <button class="period-tab active" data-period="today">오</button>
      <button class="period-tab" data-period="tomorrow">내</button>
      <button class="period-tab" data-period="week">주</button>
      <button class="period-tab" data-period="month">달</button>
      <button class="calendar-btn" id="calendarBtn">📅 달력</button>
      <span class="selected-date-label" id="selectedDateLabel"></span>
    </div>
    
    <div class="custom-calendar-wrapper" id="customCalendarWrapper">
      <div class="custom-calendar">
        <div class="cal-header">
          <button class="cal-nav-btn" id="prevMonthBtn">&lt;</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="cal-nav-btn" id="nextMonthBtn">&gt;</button>
        </div>
        <div class="cal-grid">
          <div class="cal-day-label">일</div><div class="cal-day-label">월</div><div class="cal-day-label">화</div>
          <div class="cal-day-label">수</div><div class="cal-day-label">목</div><div class="cal-day-label">금</div><div class="cal-day-label">토</div>
        </div>
        <div class="cal-grid" id="calDaysGrid"></div>
      </div>
    </div>
    
    <div class="search-wrapper" id="searchWrapper">
      <div class="action-row">
        <input type="text" class="picker-input" id="searchInput" placeholder="할일 검색...">
        <button class="action-btn" id="searchBtn">찾기</button>
      </div>
    </div>

    <div class="memo-wrapper" id="memoWrapper">
      <textarea class="memo-area" id="memoInput" placeholder="이 날의 메모..."></textarea>
      <div class="action-row" style="justify-content: flex-end;">
        <span class="save-status" id="memoStatus"></span>
        <button class="action-btn" id="saveMemoBtn">메모 저장</button>
      </div>
    </div>

    <div class="memo-wrapper" id="diaryWrapper">
      <textarea class="memo-area diary-area" id="diaryInput" placeholder="이 날의 일기..."></textarea>
      <div class="action-row" style="justify-content: flex-end;">
        <span class="save-status" id="diaryStatus"></span>
        <button class="action-btn" id="saveDiaryBtn">일기 저장</button>
      </div>
    </div>

    <div class="memo-wrapper" id="newsWrapper">
      <textarea class="memo-area news-area" id="newsInput" placeholder="이 날의 신문 스크랩..."></textarea>
      <div class="action-row" style="justify-content: flex-end;">
        <span class="save-status" id="newsStatus"></span>
        <button class="action-btn" id="saveNewsBtn">신문 저장</button>
      </div>
    </div>
  </div>
  
  <div class="container">
    <div class="goal-section" id="goalSection">
      <div class="goal-label">🎯 목표</div>
      <div class="goal-bar" id="goalBar">
        <span id="goalText">오늘의 목표를 설정해보세요.</span>
      </div>
    </div>
    <div class="goal-section" id="bookSection">
      <div class="goal-label" id="bookLabel">📚 독서 기록</div>
      <div class="goal-bar" id="bookBar">
        <span id="bookText">현재 읽고 있는 책이 없습니다. 독서 기록을 시작해보세요!</span>
      </div>
    </div>
    <div class="metrics-section" id="metricsSection">
      <div class="metrics-header">
        <span class="metrics-title">📊 일일 지표</span>
        <span class="metrics-date" id="metricsDate"></span>
      </div>
      <div class="metrics-grid">
        <div class="metric-item"><label class="metric-label">전일 계약건수</label><input type="number" class="metric-input" id="contractsCount" placeholder="0"></div>
        <div class="metric-item"><label class="metric-label">전일 DB건수</label><input type="number" class="metric-input" id="dbCount" placeholder="0"></div>
        <div class="metric-item"><label class="metric-label">이번주 토요일 방문</label><input type="number" class="metric-input" id="saturdayVisitors" placeholder="0"></div>
        <div class="metric-item"><label class="metric-label">이번주 일요일 방문</label><input type="number" class="metric-input" id="sundayVisitors" placeholder="0"></div>
      </div>
      <div class="metrics-save-row">
        <span class="save-status" id="saveStatus"></span>
        <button class="btn-save-metrics" id="btnSaveMetrics">저장</button>
      </div>
    </div>
    <div class="task-list" id="taskList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  
  <div class="add-form">
    <div class="add-form-inner">
      <div class="input-row">
        <textarea class="input-description" id="inputDescription" placeholder="할일을 입력하세요" rows="1"></textarea>
        <input type="date" class="input-date" id="inputDueDate">
      </div>
      <button class="btn-add" id="btnAdd">추가하기</button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="edit-modal-overlay" id="editModalOverlay">
    <div class="edit-modal">
      <div class="edit-modal-title">할일 수정</div>
      <textarea class="edit-modal-textarea" id="editModalTextarea" placeholder="내용을 입력하세요" rows="3"></textarea>
      <div class="edit-modal-hint">Enter: 저장 &nbsp;·&nbsp; Shift+Enter: 줄바꿈</div>
      <div class="edit-modal-actions">
        <button class="edit-modal-cancel" id="editModalCancel">취소</button>
        <button class="edit-modal-save" id="editModalSave">저장</button>
      </div>
    </div>
  </div>

  <!-- Goal Modal -->
  <div class="goal-modal-overlay" id="goalModalOverlay">
    <div class="goal-modal">
      <div class="goal-modal-header">
        <input type="text" class="goal-modal-title-input" id="goalModalTitleInput" placeholder="목표를 입력하세요">
        <button class="goal-modal-close" id="goalModalClose">×</button>
      </div>
      <div class="goal-execution-list" id="goalExecutionList">
        <!-- Execution items will be rendered here -->
      </div>
      <div class="goal-execution-input-row">
        <input type="text" class="goal-execution-input" id="goalExecutionInput" placeholder="실행할 항목을 입력하세요">
        <button class="goal-execution-add-btn" id="goalExecutionAddBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- Book Shelf Modal -->
  <div class="goal-modal-overlay" id="bookShelfModalOverlay">
    <div class="goal-modal book-shelf-modal">
      <div class="goal-modal-header">
        <div class="book-modal-title" style="font-size: 18px; font-weight: 800; color: var(--text-main);">📚 나의 서재</div>
        <button class="goal-modal-close" id="bookShelfModalClose">×</button>
      </div>
      <div class="book-shelf-tabs">
        <button class="book-tab active" data-status="all">전체</button>
        <button class="book-tab" data-status="읽는 중">읽는 중</button>
        <button class="book-tab" data-status="완독">완독</button>
        <button class="book-tab" data-status="보류">보류</button>
      </div>
      <div class="book-list" id="bookList">
        <!-- Book items will be rendered here -->
      </div>
      <div class="goal-execution-input-row">
        <input type="text" class="goal-execution-input" id="bookInput" placeholder="새 책의 제목을 입력하세요">
        <button class="goal-execution-add-btn" id="bookAddBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- Book Notes Modal -->
  <div class="goal-modal-overlay" id="bookNotesModalOverlay">
    <div class="goal-modal book-notes-modal">
      <div class="goal-modal-header" style="flex-direction: column; align-items: flex-start; gap: 6px; position: relative;">
        <div class="book-notes-header-top" style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
          <div class="book-notes-title-container" style="display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;">
            <span class="book-notes-badge" id="bookNotesBadge">읽는 중</span>
            <input type="text" class="book-notes-title-input" id="bookNotesTitleInput" placeholder="책 제목을 입력하세요">
          </div>
          <button class="goal-modal-close" id="bookNotesModalClose" style="position: absolute; right: 0; top: 0;">×</button>
        </div>
      </div>
      <div class="book-notes-status-row">
        <span class="status-change-label">상태 변경:</span>
        <div class="status-chips">
          <button class="status-chip" data-status="읽는 중">읽는 중</button>
          <button class="status-chip" data-status="완독">완독</button>
          <button class="status-chip" data-status="보류">보류</button>
        </div>
      </div>
      <div class="book-notes-editor-container">
        <label class="book-notes-label">독서 메모 / 한 줄 요약</label>
        <textarea class="book-notes-textarea" id="bookNotesTextarea" placeholder="책을 읽으며 기억하고 싶은 문장이나 생각을 자유롭게 기록하세요..."></textarea>
      </div>
      <div class="book-notes-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; width: 100%;">
        <button class="book-notes-delete-btn" id="bookNotesDeleteBtn">기록 삭제</button>
        <div class="book-notes-footer-right" style="display: flex; align-items: center; gap: 12px;">
          <span class="save-status" id="bookNotesSaveStatus" style="font-size: 12px; margin-right: 4px;"></span>
          <button class="book-notes-close-btn" id="bookNotesConfirmBtn">완료</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./js/supabase.js"></script>
  <script src="./js/app.js?v=3.0"></script>
</body>
</html>
