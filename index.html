<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Todo List</title>
  <link rel="stylesheet" href="./css/style.css?v=2.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1><img src="./images/logo.png" alt="로고" class="header-logo"> TODO LIST</h1>
      <div class="header-actions">
        <button class="icon-btn" id="searchToggleBtn">🔍</button>
        <button class="icon-btn" id="memoToggleBtn" title="메모">
          📝
          <span class="memo-badge" id="memoBadge" style="background:#ff3b30;">♥</span>
        </button>
        <button class="icon-btn" id="diaryToggleBtn" title="일기장">
          📔
          <span class="memo-badge" id="diaryBadge" style="background:#3b82f6;">♥</span>
        </button>
        <button class="icon-btn" id="newsToggleBtn" title="신문">
          📰
          <span class="memo-badge" id="newsBadge" style="background:#10b981;">♥</span>
        </button>
      </div>
    </div>
    
    <div class="period-tabs">
      <button class="period-tab" data-period="yesterday">어</button>
      <button class="period-tab active" data-period="today">오</button>
      <button class="period-tab" data-period="tomorrow">내</button>
      <button class="period-tab" data-period="week">주</button>
      <button class="period-tab" data-period="month">달</button>
      <button class="calendar-btn" id="calendarBtn">📅 달력</button>
      <span class="selected-date-label" id="selectedDateLabel"></span>
    </div>
    
    <div class="custom-calendar-wrapper" id="customCalendarWrapper">
      <div class="custom-calendar">
        <div class="cal-header">
          <button class="cal-nav-btn" id="prevMonthBtn">&lt;</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="cal-nav-btn" id="nextMonthBtn">&gt;</button>
        </div>
        <div class="cal-grid">
          <div class="cal-day-label">일</div><div class="cal-day-label">월</div><div class="cal-day-label">화</div>
          <div class="cal-day-label">수</div><div class="cal-day-label">목</div><div class="cal-day-label">금</div><div class="cal-day-label">토</div>
        </div>
        <div class="cal-grid" id="calDaysGrid"></div>
      </div>
    </div>
    
    <div class="search-wrapper" id="searchWrapper">
      <div class="action-row">
        <input type="text" class="picker-input" id="searchInput" placeholder="할일 검색...">
        <button class="action-btn" id="searchBtn">찾기</button>
      </div>
    </div>

    <div class="memo-wrapper" id="memoWrapper">
      <textarea class="memo-area" id="memoInput" placeholder="이 날의 메모..."></textarea>
      <div class="action-row" style="justify-content: flex-end;">
        <span class="save-status" id="memoStatus"></span>
        <button class="action-btn" id="saveMemoBtn">메모 저장</button>
      </div>
    </div>

    <div class="memo-wrapper" id="diaryWrapper">
      <textarea class="memo-area diary-area" id="diaryInput" placeholder="이 날의 일기..."></textarea>
      <div class="action-row" style="justify-content: flex-end;">
        <span class="save-status" id="diaryStatus"></span>
        <button class="action-btn" id="saveDiaryBtn">일기 저장</button>
      </div>
    </div>

    <div class="memo-wrapper" id="newsWrapper">
      <textarea class="memo-area news-area" id="newsInput" placeholder="이 날의 신문 스크랩..."></textarea>
      <div class="action-row" style="justify-content: flex-end;">
        <span class="save-status" id="newsStatus"></span>
        <button class="action-btn" id="saveNewsBtn">신문 저장</button>
      </div>
    </div>
  </div>
  
  <div class="container">
    <div class="metrics-section" id="metricsSection">
      <div class="metrics-header">
        <span class="metrics-title">📊 일일 지표</span>
        <span class="metrics-date" id="metricsDate"></span>
      </div>
      <div class="metrics-grid">
        <div class="metric-item"><label class="metric-label">전일 계약건수</label><input type="number" class="metric-input" id="contractsCount" placeholder="0"></div>
        <div class="metric-item"><label class="metric-label">전일 DB건수</label><input type="number" class="metric-input" id="dbCount" placeholder="0"></div>
        <div class="metric-item"><label class="metric-label">이번주 토요일 방문</label><input type="number" class="metric-input" id="saturdayVisitors" placeholder="0"></div>
        <div class="metric-item"><label class="metric-label">이번주 일요일 방문</label><input type="number" class="metric-input" id="sundayVisitors" placeholder="0"></div>
      </div>
      <div class="metrics-save-row">
        <span class="save-status" id="saveStatus"></span>
        <button class="btn-save-metrics" id="btnSaveMetrics">저장</button>
      </div>
    </div>
    <div class="task-list" id="taskList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  
  <div class="add-form">
    <div class="add-form-inner">
      <div class="input-row">
        <textarea class="input-description" id="inputDescription" placeholder="할일을 입력하세요" rows="1"></textarea>
        <input type="date" class="input-date" id="inputDueDate">
      </div>
      <button class="btn-add" id="btnAdd">추가하기</button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="edit-modal-overlay" id="editModalOverlay">
    <div class="edit-modal">
      <div class="edit-modal-title">할일 수정</div>
      <textarea class="edit-modal-textarea" id="editModalTextarea" placeholder="내용을 입력하세요" rows="3"></textarea>
      <div class="edit-modal-hint">Enter: 저장 &nbsp;·&nbsp; Shift+Enter: 줄바꿈</div>
      <div class="edit-modal-actions">
        <button class="edit-modal-cancel" id="editModalCancel">취소</button>
        <button class="edit-modal-save" id="editModalSave">저장</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./js/supabase.js"></script>
  <script src="./js/app.js?v=2.0"></script>
</body>
</html>
